name: frappe_mobile_item_app
description: "Production-grade Flutter mobile app for Frappe Item CRUD"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0
  dio: ^5.9.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  flutter_secure_storage: ^9.2.4
  drift: ^2.29.0
  drift_flutter: ^0.2.6
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1
  talker_flutter: ^4.9.3
  sentry_flutter: ^9.7.0
  intl: ^0.20.2
  google_fonts: ^6.3.2
  image_picker: ^1.1.2
  package_info_plus: ^8.1.4

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  json_serializable: ^6.11.1
  freezed: ^3.2.3
  drift_dev: ^2.29.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true



